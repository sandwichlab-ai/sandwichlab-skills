name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    # 只在 main 分支的 tag 上运行
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Verify branch (for tag push)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          # 获取 tag 指向的 commit
          TAG_COMMIT=$(git rev-parse HEAD)
          # 获取 main 分支的最新 commit
          MAIN_COMMIT=$(git rev-parse origin/main)
          
          # 检查 tag 是否在 main 分支上
          if ! git merge-base --is-ancestor $TAG_COMMIT origin/main; then
            echo "❌ Tag must be created from main branch"
            exit 1
          fi
          
          echo "✅ Tag is on main branch"
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: cli/go.sum
      
      - name: Build binary
        working-directory: cli
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          fi
          
          if [ "${{ matrix.os }}" = "windows" ]; then
            go build -ldflags="-s -w -X main.Version=${VERSION}" -o ahcli-${{ matrix.os }}-${{ matrix.arch }}.exe .
          else
            go build -ldflags="-s -w -X main.Version=${VERSION}" -o ahcli-${{ matrix.os }}-${{ matrix.arch }} .
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ahcli-${{ matrix.os }}-${{ matrix.arch }}
          path: cli/ahcli-${{ matrix.os }}-${{ matrix.arch }}*
          retention-days: 1

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -name 'ahcli-*' -exec mv {} release/ \;
          chmod +x release/ahcli-* || true
          
          cd release
          sha256sum ahcli-* > checksums.txt
          cat checksums.txt
      
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/ahcli-*
            release/checksums.txt
